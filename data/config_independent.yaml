# Voter Transition Study Configuration - INDEPENDENT CITY MODELS
# Configuration for independent city models using countrywide matrix as prior
# Each city is fit separately without hierarchical pooling

# Target cities for city-level transition matrix analysis
cities:
  target_cities:
    - ashdod
    - beit shemesh
    - elad
    - bnei brak
    - jerusalem
    - modi'in illit

# Data processing settings
data:
  # Homogenic filtering settings
  homogenic_filtering:
    enabled: true
    threshold: 0.75  # >75% Haredi party votes (Shas + Agudat Israel)

  # Elections to process (Knesset election numbers)
  elections:
    - 18
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
    - 25

  # Election pairs for transition analysis
  transition_pairs:
    - kn18_19
    - kn19_20
    - kn20_21
    - kn21_22
    - kn22_23
    - kn23_24
    - kn24_25

# PyMC model parameters
model:
  # Prior parameters for independent city models
  logistic_normal:
    diag_bias_mean: 2.0        # Mean for diagonal bias (loyalty) parameter
    diag_bias_sigma: 0.3       # Standard deviation for diagonal bias parameter
    sigma_country: 0.5         # Scale for country-level logit variation
    sigma_city: 0.8           # Scale for city deviation from country prior (INDEPENDENT)

  # Temporal priors configuration (use previous transition as prior)
  temporal_priors:
    enabled: true                 # If true, use previous pair's posterior as prior
    center: mean                  # mean|median centers for priors
    # Innovation scales for how tightly to trust previous estimates
    innovation:
      diag_bias_sigma: 0.3        # Prior sd around previous diag_bias
      Z_country_sigma: 0.5        # Prior sd for Z_country logits

  parameterization:
    matrix_convention: columns_from_rows_to   # columns = "from", rows = "to"; keep q = p1 @ M.T
    enforce_category_order: true              # validate x1/x2 category order before modeling
    plotting_rows: to                         # when plotting heatmaps, rows=to, cols=from
    plotting_cols: from

  # MCMC sampling parameters
  sampling:
    draws: 3000                 # Posterior samples per chain
    tune: 3000                  # Tuning samples per chain
    chains: 4                   # Number of parallel chains
    target_accept: 0.95         # Target acceptance rate for NUTS
    max_treedepth: 12           # Maximum tree depth
    init: "adapt_diag"          # Initialization method

  # Convergence diagnostics thresholds
  diagnostics:
    max_rhat: 1.01             # Maximum R-hat for convergence
    min_ess_bulk: 400          # Minimum bulk ESS
    min_ess_tail: 400          # Minimum tail ESS

# Party categories for transition modeling
categories:
  - shas                       # Shas party (שס)
  - agudat_israel             # Agudat Israel (ג)
  - other                     # All other parties combined
  - abstained                 # Non-voters + invalid votes

# File paths and naming conventions
paths:
  # Data directories
  raw_data: "data/raw"
  interim_data: "data/interim"
  processed_data: "data/processed"
  external_data: "data/external"

  # External mapping files
  columns_mapping: "data/external/columns.csv"
  columns_extended: "data/external/columns_extended.csv"
  cities_mapping: "data/external/israeli_cities_hebrew_english.csv"

  # Output directories - MODIFIED to save to separate directory
  transitions_dir: "data/processed/transitions_independent"
  logs_dir: "data/processed/logs_independent"
